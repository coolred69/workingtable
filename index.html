<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워킹표</title>

<!-- Firebase Compat SDK (non-module, globally available) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');

:root {
  --primary: #1a237e;
  --primary-light: #283593;
  --accent: #e53935;
  --accent2: #ff6f00;
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #c8cdd6;
  --text: #1c2340;
  --text-sub: #6b7280;
  --shadow: 0 2px 8px rgba(26,35,126,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#loginScreen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #3949ab 100%);
}
.login-box {
  background: #fff; border-radius: 16px; padding: 40px 36px; width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px;
  color: var(--primary); text-align: center; margin-bottom: 4px;
}
.login-sub { text-align: center; font-size: 12px; color: var(--text-sub); margin-bottom: 28px; letter-spacing: 1px; }
.login-box label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; letter-spacing: 1px; }
.login-box select, .login-box input[type="password"] {
  width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: 'Noto Sans KR', sans-serif; margin-bottom: 16px;
  outline: none; transition: border-color .2s;
}
.login-box select:focus, .login-box input:focus { border-color: var(--primary); }
.btn-login {
  width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 8px;
  padding: 13px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 2px;
  transition: background .2s; font-family: 'Noto Sans KR', sans-serif;
}
.btn-login:hover { background: var(--primary-light); }
#loginError { color: var(--accent); font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
.login-hint { margin-top: 18px; padding-top: 14px; border-top: 1px solid #e5e7eb; font-size: 11px; color: #9ca3af; text-align: center; }

/* ── APP ── */
#app { display: none; }

.topbar {
  background: var(--primary); color: #fff; display: flex; align-items: center;
  justify-content: space-between; padding: 0 20px; height: 54px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(26,35,126,0.2);
}
.topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.topbar-role { font-size: 12px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-weight: 500; }
.btn-sm {
  background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: background .2s; white-space: nowrap;
}
.btn-sm:hover { background: rgba(255,255,255,0.28); }
.btn-danger { background: rgba(229,57,53,0.6); border-color: rgba(229,57,53,0.4); }

.sync-bar {
  background: #e8eaf6; text-align: center; font-size: 12px; color: var(--primary);
  padding: 4px 0; font-weight: 500; min-height: 22px;
}
.sync-bar.error { background: #ffebee; color: var(--accent); }
.sync-bar.offline { background: #fff8e1; color: #e65100; }

/* ── SETTINGS ── */
.settings-panel {
  display: none; background: #fff; border-radius: 12px;
  margin: 10px auto; padding: 18px 22px;
  box-shadow: var(--shadow); border: 1.5px solid var(--border);
  max-width: 1100px; margin-left: 16px; margin-right: 16px;
}
.settings-panel h3 { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 12px; letter-spacing: 0.8px; }
.settings-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.settings-row label { font-size: 13px; color: var(--text); font-weight: 600; min-width: 70px; }
.settings-row input[type="number"],
.settings-row input[type="password"] {
  padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px;
  font-size: 14px; outline: none; font-family: 'Noto Sans KR', sans-serif;
}
.settings-row input[type="number"] { width: 80px; }
.settings-row input[type="password"] { width: 130px; }
.settings-row select {
  padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px;
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none;
}
.btn-apply {
  background: var(--primary); color: #fff; border: none; border-radius: 7px;
  padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: background .2s;
}
.btn-apply:hover { background: var(--primary-light); }
.settings-ok { color: #2e7d32; font-size: 12px; }

/* ── TABLE ── */
.table-wrap { padding: 14px 16px 30px; max-width: 1100px; margin: 0 auto; }
.table-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.table-date { font-size: 13px; color: var(--text-sub); font-weight: 500; }
.cell-count-ctrl {
  display: flex; align-items: center; gap: 8px; background: #fff;
  border-radius: 8px; padding: 5px 12px; box-shadow: var(--shadow);
  font-size: 13px; font-weight: 700; color: var(--primary);
}
.cell-count-ctrl button {
  width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg); font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-weight: 700; color: var(--primary); transition: background .15s;
}
.cell-count-ctrl button:hover { background: var(--primary); color: #fff; }

/* ── GRID ── */
.working-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

.w-cell {
  background: var(--card); border-radius: 10px; border: 1.5px solid var(--border);
  box-shadow: var(--shadow); min-height: 110px; position: relative;
  display: flex; flex-direction: column; overflow: hidden; transition: box-shadow .2s, border-color .2s;
}
.w-cell:hover { border-color: #7986cb; box-shadow: 0 4px 16px rgba(26,35,126,0.13); }
.w-cell.checked { background: #fff8f8; border-color: var(--accent); }

.cell-num {
  position: absolute; top: 7px; left: 9px;
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  color: var(--primary); opacity: 0.4; line-height: 1;
}
.cell-x-overlay {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center; pointer-events: none; opacity: 0; transition: opacity .2s;
}
.w-cell.checked .cell-x-overlay { opacity: 1; }
.cell-x-text {
  font-family: 'Bebas Neue', sans-serif; font-size: 72px;
  color: rgba(229,57,53,0.18); line-height: 1; user-select: none;
}
.cell-check-btn {
  position: absolute; top: 5px; right: 5px; width: 28px; height: 28px;
  border-radius: 6px; border: 1.5px solid var(--border); background: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .15s; z-index: 2;
}
.cell-check-btn:hover { border-color: var(--accent); background: #ffebee; }
.w-cell.checked .cell-check-btn { border-color: var(--accent); background: var(--accent); color: #fff; }

.cell-body {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 8px 10px 26px 36px; gap: 2px; position: relative; z-index: 1;
}
.cell-honbu { font-size: 11px; font-weight: 700; color: var(--primary); }
.cell-team  { font-size: 11px; font-weight: 600; color: var(--accent2); }
.cell-name  { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 3px; }
.cell-pos   { font-size: 11px; color: var(--text-sub); font-weight: 500; }
.cell-empty { color: #d1d5db; font-size: 12px; }

.cell-edit-btn {
  position: absolute; bottom: 6px; right: 8px; font-size: 11px;
  color: var(--primary); background: #e8eaf6; border: none; border-radius: 5px;
  padding: 3px 8px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600; opacity: 0; transition: opacity .15s; z-index: 2;
}
.w-cell:hover .cell-edit-btn { opacity: 1; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 300;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 14px; padding: 28px 28px 22px;
  width: 360px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative;
}
.modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.modal-title  { font-size: 16px; font-weight: 700; color: var(--primary); }
.role-badge {
  display: inline-block; background: #e8eaf6; color: var(--primary);
  border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700;
}
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-sub); }
.modal label { display: block; font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 5px; letter-spacing: 0.8px; }
.modal input[type="text"] {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 7px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; margin-bottom: 12px;
  transition: border-color .2s;
}
.modal input:focus { border-color: var(--primary); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
.btn-save {
  background: var(--primary); color: #fff; border: none; border-radius: 7px;
  padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: background .2s;
}
.btn-save:hover { background: var(--primary-light); }
.btn-cancel {
  background: var(--bg); color: var(--text); border: 1.5px solid var(--border);
  border-radius: 7px; padding: 10px 16px; font-size: 14px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.modal-no-perm { color: #9ca3af; font-size: 13px; padding: 16px 0; text-align: center; }

/* ── PRINT ── */
@media print {
  @page { size: A4; margin: 10mm; }
  body { background: #fff !important; }
  #loginScreen, .topbar, .sync-bar, .settings-panel, .table-meta,
  .cell-edit-btn, .cell-check-btn, .modal-overlay { display: none !important; }
  #app { display: block !important; }
  .table-wrap { padding: 0; max-width: 100%; }
  .working-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .w-cell { break-inside: avoid; border: 1.5px solid #aaa !important; box-shadow: none !important; min-height: 85px; }
  .w-cell.checked .cell-x-overlay { opacity: 1 !important; }
  .w-cell.checked .cell-x-text { color: rgba(180,0,0,0.35) !important; }
}

/* ── MOBILE ── */
@media (max-width: 640px) {
  .working-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar { padding: 0 12px; }
  .topbar-title { font-size: 22px; }
  .table-wrap { padding: 10px 10px 20px; }
  .modal { padding: 22px 18px 18px; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">워킹표</div>
    <div class="login-sub">WORKING TABLE SYSTEM</div>
    <label>역할 선택</label>
    <select id="roleSelect">
      <option value="">-- 역할을 선택하세요 --</option>
      <option value="총괄본부장">총괄본부장</option>
      <option value="본부장">본부장</option>
      <option value="팀장">팀장</option>
      <option value="직원">직원 (열람 전용)</option>
    </select>
    <label>PIN 번호 <span style="font-weight:400;color:#9ca3af;font-size:11px">(직원은 불필요)</span></label>
    <input type="password" id="pinInput" placeholder="PIN 입력" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div id="loginError"></div>
    <div class="login-hint">초기 PIN — 총괄본부장: <b>0000</b> · 본부장: <b>1111</b> · 팀장: <b>2222</b></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">워킹표</div>
    <div class="topbar-right">
      <div class="topbar-role" id="roleDisplay"></div>
      <button class="btn-sm" id="settingsBtn" onclick="toggleSettings()" style="display:none">⚙️ 설정</button>
      <button class="btn-sm" onclick="window.print()">🖨️ 인쇄</button>
      <button class="btn-sm btn-danger" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar">Firebase 연결 중...</div>

  <!-- 총괄본부장 설정 패널 -->
  <div class="settings-panel" id="settingsPanel">
    <h3>⚙️ 총괄본부장 설정</h3>
    <div class="settings-row">
      <label>표 칸 수</label>
      <input type="number" id="cellCountInput" min="1" max="60" value="20">
      <button class="btn-apply" onclick="updateCellCount()">적용</button>
      <span style="font-size:12px;color:#9ca3af">현재: <b id="currentCountTxt">20</b>칸 (최대 60)</span>
    </div>
    <div class="settings-row">
      <label>PIN 변경</label>
      <select id="pinRoleSelect">
        <option value="총괄본부장">총괄본부장</option>
        <option value="본부장">본부장</option>
        <option value="팀장">팀장</option>
      </select>
      <input type="password" id="newPinInput" placeholder="새 PIN (4자리 이상)">
      <button class="btn-apply" onclick="updatePin()">변경</button>
      <span class="settings-ok" id="pinMsg"></span>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-meta">
      <div class="table-date" id="tableDateTxt"></div>
      <div id="cellCtrlWrap" style="display:none">
        <div class="cell-count-ctrl">
          <button onclick="quickAdjust(-1)">−</button>
          <span id="cellCountDisplay">20</span>칸
          <button onclick="quickAdjust(1)">＋</button>
        </div>
      </div>
    </div>
    <div class="working-grid" id="workingGrid"></div>
  </div>
</div>

<!-- ── EDIT MODAL ── -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">셀 편집</div>
      <div class="role-badge" id="modalRoleBadge"></div>
    </div>
    <div id="modalFields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="modalSaveBtn" onclick="saveCell()">저장</button>
    </div>
  </div>
</div>

<!-- ── MAIN SCRIPT (일반 script, module 아님) ── -->
<script>
// ── Firebase 초기화 ──
const firebaseConfig = {
  apiKey: "AIzaSyAkG-AxbwFt9MUlP9E3alAbIjN9-HHkWE8",
  authDomain: "gs25-payroll.firebaseapp.com",
  databaseURL: "https://gs25-payroll-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gs25-payroll",
  storageBucket: "gs25-payroll.firebasestorage.app",
  messagingSenderId: "244037450297",
  appId: "1:244037450297:web:c1fa4b79aa38849985ebe8"
};

firebase.initializeApp(firebaseConfig);
const db    = firebase.database();
const ROOT  = 'working_table';
const dbRef = db.ref(ROOT);

// ── 기본 구조 ──
const DEFAULT = {
  settings: { cellCount: 20, pins: { 총괄본부장:'0000', 본부장:'1111', 팀장:'2222' } },
  cells: {}
};

// ── 전역 상태 ──
var currentRole = '';
var appData     = JSON.parse(JSON.stringify(DEFAULT));
var editingIdx  = null;
var saveTimer   = null;
var appReady    = false;

// ── Sync 표시 ──
function setSync(state, msg) {
  var el = document.getElementById('syncBar');
  el.className = 'sync-bar' + (state !== 'ok' ? ' ' + state : '');
  el.textContent = msg;
}

// ── Firebase 실시간 구독 ──
dbRef.on('value', function(snap) {
  var data = snap.val();
  if (data) {
    appData = data;
    if (!appData.settings)           appData.settings = JSON.parse(JSON.stringify(DEFAULT.settings));
    if (!appData.settings.pins)      appData.settings.pins = JSON.parse(JSON.stringify(DEFAULT.settings.pins));
    if (!appData.settings.cellCount) appData.settings.cellCount = 20;
    if (!appData.cells)              appData.cells = {};
    setSync('ok', '✅ 실시간 동기화 중 · 전체 직원 공유됨');
  } else {
    dbRef.set(DEFAULT);
  }
  if (appReady) renderGrid();
}, function(err) {
  setSync('error', '❌ Firebase 연결 실패: ' + err.message);
});

window.addEventListener('offline', function() { setSync('offline', '📵 오프라인 — 인터넷 연결 확인'); });
window.addEventListener('online',  function() { setSync('ok', '✅ 온라인 복구'); });

// ── DB 부분 저장 ──
function savePartial(data, path) {
  setSync('ok', '☁️ 저장 중...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    db.ref(ROOT + '/' + path).set(data)
      .then(function() { setSync('ok', '✅ 저장 완료 · 실시간 공유 중'); })
      .catch(function(e) { setSync('error', '❌ 저장 실패: ' + e.message); });
  }, 500);
}

// ── 로그인 ──
function doLogin() {
  var role = document.getElementById('roleSelect').value;
  var pin  = document.getElementById('pinInput').value;
  var err  = document.getElementById('loginError');
  err.textContent = '';

  if (!role) { err.textContent = '역할을 선택해주세요.'; return; }

  if (role === '직원 (열람 전용)' || role === '직원') {
    currentRole = '직원';
    startApp();
    return;
  }

  var correctPin = (appData.settings && appData.settings.pins && appData.settings.pins[role])
                   || DEFAULT.settings.pins[role] || '0000';

  if (pin !== correctPin) { err.textContent = 'PIN이 올바르지 않습니다.'; return; }

  currentRole = role;
  startApp();
}

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('roleDisplay').textContent = currentRole;

  var now  = new Date();
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('tableDateTxt').textContent =
    now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 (' + days[now.getDay()] + ')';

  if (currentRole === '총괄본부장') {
    document.getElementById('settingsBtn').style.display = '';
    document.getElementById('cellCtrlWrap').style.display = '';
  }

  appReady = true;
  renderGrid();
}

function doLogout() {
  currentRole = '';
  appReady    = false;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('roleSelect').value  = '';
  document.getElementById('pinInput').value    = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('settingsPanel').style.display = 'none';
  document.getElementById('settingsBtn').style.display   = 'none';
  document.getElementById('cellCtrlWrap').style.display  = 'none';
}

// ── 그리드 렌더링 ──
function renderGrid() {
  var count = (appData.settings && appData.settings.cellCount) ? appData.settings.cellCount : 20;
  document.getElementById('cellCountDisplay').textContent = count;
  document.getElementById('currentCountTxt').textContent  = count;
  document.getElementById('cellCountInput').value = count;

  var grid = document.getElementById('workingGrid');
  grid.innerHTML = '';

  for (var i = 0; i < count; i++) {
    (function(idx) {
      var cell = (appData.cells && appData.cells[idx])
                 ? appData.cells[idx]
                 : { 본부:'', 팀:'', 이름:'', 직책:'', checked:false };

      var div = document.createElement('div');
      div.className = 'w-cell' + (cell.checked ? ' checked' : '');

      // 번호
      var num = document.createElement('div');
      num.className = 'cell-num';
      num.textContent = idx + 1;
      div.appendChild(num);

      // X 오버레이
      var xOver = document.createElement('div');
      xOver.className = 'cell-x-overlay';
      var xTxt = document.createElement('span');
      xTxt.className = 'cell-x-text';
      xTxt.textContent = 'X';
      xOver.appendChild(xTxt);
      div.appendChild(xOver);

      // 체크 버튼 (총괄만)
      if (currentRole === '총괄본부장') {
        var chk = document.createElement('button');
        chk.className = 'cell-check-btn';
        chk.title = cell.checked ? 'X 취소' : 'X 체크';
        chk.textContent = cell.checked ? '✕' : '□';
        chk.onclick = (function(i2) {
          return function(e) { e.stopPropagation(); toggleCheck(i2); };
        })(idx);
        div.appendChild(chk);
      }

      // 본문
      var body = document.createElement('div');
      body.className = 'cell-body';
      if (!cell.본부 && !cell.팀 && !cell.이름) {
        body.innerHTML = '<span class="cell-empty">미입력</span>';
      } else {
        if (cell.본부) body.innerHTML += '<div class="cell-honbu">' + cell.본부 + '</div>';
        if (cell.팀)   body.innerHTML += '<div class="cell-team">'  + cell.팀   + '</div>';
        if (cell.이름)  body.innerHTML += '<div class="cell-name">'  + cell.이름  + '</div>';
        if (cell.직책)  body.innerHTML += '<div class="cell-pos">'   + cell.직책  + '</div>';
      }
      div.appendChild(body);

      // 편집 버튼 (직원 제외)
      if (currentRole !== '직원') {
        var eb = document.createElement('button');
        eb.className = 'cell-edit-btn';
        eb.textContent = '편집';
        eb.onclick = (function(i2) {
          return function(e) { e.stopPropagation(); openModal(i2); };
        })(idx);
        div.appendChild(eb);
      }

      grid.appendChild(div);
    })(i);
  }
}

// ── 체크 토글 ──
function toggleCheck(idx) {
  if (!appData.cells) appData.cells = {};
  if (!appData.cells[idx]) appData.cells[idx] = { 본부:'', 팀:'', 이름:'', 직책:'', checked:false };
  appData.cells[idx].checked = !appData.cells[idx].checked;
  savePartial(appData.cells[idx], 'cells/' + idx);
  renderGrid();
}

// ── 역할별 편집 필드 ──
function getEditFields(role) {
  if (role === '총괄본부장') return ['본부','팀','이름','직책'];
  if (role === '본부장')     return ['팀','직책'];
  if (role === '팀장')       return ['이름','직책'];
  return [];
}

// ── 모달 ──
function openModal(idx) {
  editingIdx = idx;
  var cell   = (appData.cells && appData.cells[idx]) ? appData.cells[idx] : { 본부:'', 팀:'', 이름:'', 직책:'', checked:false };
  var fields = getEditFields(currentRole);

  document.getElementById('modalTitle').textContent    = (idx + 1) + '번 셀 편집';
  document.getElementById('modalRoleBadge').textContent = currentRole;

  var container = document.getElementById('modalFields');
  container.innerHTML = '';
  var saveBtn = document.getElementById('modalSaveBtn');

  if (fields.length === 0) {
    container.innerHTML = '<div class="modal-no-perm">이 역할은 편집 권한이 없습니다.</div>';
    saveBtn.style.display = 'none';
    document.getElementById('editModal').classList.add('open');
    return;
  }

  saveBtn.style.display = '';
  var labels = { 본부:'본부 (예: 1본부)', 팀:'팀명/실명 (예: 5팀)', 이름:'이름 (예: 이재식)', 직책:'직책 (예: 부장)' };
  fields.forEach(function(f) {
    var lbl = document.createElement('label');
    lbl.textContent = labels[f];
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.id   = 'mf_' + f;
    inp.value = cell[f] || '';
    inp.placeholder = labels[f];
    inp.onkeydown = function(e) { if (e.key === 'Enter') saveCell(); };
    container.appendChild(lbl);
    container.appendChild(inp);
  });

  document.getElementById('editModal').classList.add('open');
  setTimeout(function() {
    var first = container.querySelector('input');
    if (first) first.focus();
  }, 80);
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editingIdx = null;
}

function saveCell() {
  if (editingIdx === null) return;
  var fields = getEditFields(currentRole);
  if (!appData.cells) appData.cells = {};
  if (!appData.cells[editingIdx]) appData.cells[editingIdx] = { 본부:'', 팀:'', 이름:'', 직책:'', checked:false };
  fields.forEach(function(f) {
    var el = document.getElementById('mf_' + f);
    if (el) appData.cells[editingIdx][f] = el.value.trim();
  });
  savePartial(appData.cells[editingIdx], 'cells/' + editingIdx);
  renderGrid();
  closeModal();
}

// ── 칸 수 조절 ──
function updateCellCount() {
  var v = parseInt(document.getElementById('cellCountInput').value);
  if (!v || v < 1 || v > 60) { alert('1~60 사이 숫자를 입력하세요.'); return; }
  if (!appData.settings) appData.settings = JSON.parse(JSON.stringify(DEFAULT.settings));
  appData.settings.cellCount = v;
  savePartial(appData.settings, 'settings');
  renderGrid();
}

function quickAdjust(delta) {
  if (currentRole !== '총괄본부장') return;
  var cur  = (appData.settings && appData.settings.cellCount) ? appData.settings.cellCount : 20;
  var next = Math.max(1, Math.min(60, cur + delta));
  if (!appData.settings) appData.settings = JSON.parse(JSON.stringify(DEFAULT.settings));
  appData.settings.cellCount = next;
  savePartial(appData.settings, 'settings');
  renderGrid();
}

// ── PIN 변경 ──
function updatePin() {
  var role   = document.getElementById('pinRoleSelect').value;
  var newPin = document.getElementById('newPinInput').value.trim();
  var msgEl  = document.getElementById('pinMsg');
  msgEl.textContent = '';
  if (!newPin || newPin.length < 4) {
    msgEl.textContent = 'PIN은 4자리 이상 입력하세요.';
    msgEl.style.color = 'var(--accent)';
    return;
  }
  if (!appData.settings)      appData.settings      = JSON.parse(JSON.stringify(DEFAULT.settings));
  if (!appData.settings.pins) appData.settings.pins = JSON.parse(JSON.stringify(DEFAULT.settings.pins));
  appData.settings.pins[role] = newPin;
  savePartial(appData.settings, 'settings');
  msgEl.textContent = '✅ ' + role + ' PIN 변경 완료';
  msgEl.style.color = '#2e7d32';
  document.getElementById('newPinInput').value = '';
}

function toggleSettings() {
  var p = document.getElementById('settingsPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

// ESC → 모달 닫기
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
